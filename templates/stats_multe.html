{% extends 'base.html' %}

{% block content %}

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="display-5 text-artiglio mb-2"><i class="bi bi-currency-euro me-2"></i>Statistiche Multe</h1>
            <p class="text-muted">Analisi dati e trend multe</p>
        </div>
        <a href="{{ url_for('main.multe') }}" class="btn btn-outline-secondary rounded-pill">
            <i class="bi bi-arrow-left me-2"></i>Torna alle Multe
        </a>
    </div>

    <div class="row g-4 mb-4">
        <!-- Trend Multe Mensili -->
        <div class="col-lg-12">
            <div class="card bg-dark border-secondary shadow-sm h-100">
                <div class="card-header bg-transparent border-secondary">
                    <h5 class="text-artiglio mb-0"><i class="bi bi-graph-up me-2"></i>Trend Multe Mensili</h5>
                </div>
                <div class="card-body">
                    <canvas id="multeMensiliChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Multe per Giocatore -->
        <div class="col-lg-8">
            <div class="card bg-dark border-secondary shadow-sm h-100">
                <div class="card-header bg-transparent border-secondary">
                    <h5 class="text-artiglio mb-0"><i class="bi bi-bar-chart me-2"></i>Multe per Giocatore</h5>
                </div>
                <div class="card-body">
                    <canvas id="multeGiocatoreChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Top 5 Denunciatori -->
        <div class="col-lg-4">
            <div class="card bg-dark border-secondary shadow-sm h-100">
                <div class="card-header bg-transparent border-secondary">
                    <h5 class="text-artiglio mb-0"><i class="bi bi-people me-2"></i>Top 5 Denunciatori</h5>
                </div>
                <div class="card-body">
                    <canvas id="denunciatoriChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
    if (typeof window.initStatsMulte === 'function') {
        const data = {
            mesiMulte: {{ mesi_multe | tojson | safe
    }},
    multeCountPerMese: { { multe_count_per_mese | tojson | safe } },
    giocatoriNomi: [{% for player in multe_per_giocatore %}'{{ player[0] or player[1] }}'{% if not loop.last %}, {% endif %} {% endfor %}],
    giocatoriImpos: [{% for player in multe_per_giocatore %}{ { player[2] } } {% if not loop.last %}, {% endif %} {% endfor %}],
    denunciatoriNomi: [{% for d in denunciatori %}'{{ d[0] or d[1] }}'{% if not loop.last %}, {% endif %} {% endfor %}],
    denunciatoriConteggi: [{% for d in denunciatori %}{ { d[2] } } {% if not loop.last %}, {% endif %} {% endfor %}]
        };
    window.initStatsMulte(data);
    }
</script>

{% endblock %}
