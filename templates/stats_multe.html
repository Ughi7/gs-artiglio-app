{% extends 'base.html' %}

{% block content %}

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="display-5 text-artiglio mb-2"><i class="bi bi-currency-euro me-2"></i>Statistiche Multe</h1>
            <p class="text-muted">Analisi dati e trend multe</p>
        </div>
        <a href="{{ url_for('fines.multe') }}" class="btn btn-outline-secondary rounded-pill">
            <i class="bi bi-arrow-left me-2"></i>Torna alle Multe
        </a>
    </div>

    <div class="row g-4 mb-4">
        <!-- Trend Multe Mensili -->
        <div class="col-lg-12">
            <div class="card bg-dark border-secondary shadow-sm h-100">
                <div class="card-header bg-transparent border-secondary">
                    <h5 class="text-artiglio mb-0"><i class="bi bi-graph-up me-2"></i>Trend Multe Mensili</h5>
                </div>
                <div class="card-body">
                    <canvas id="multeMensiliChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Multe per Giocatore -->
        <div class="col-lg-8">
            <div class="card bg-dark border-secondary shadow-sm h-100">
                <div class="card-header bg-transparent border-secondary">
                    <h5 class="text-artiglio mb-0"><i class="bi bi-bar-chart me-2"></i>Multe per Giocatore</h5>
                </div>
                <div class="card-body">
                    <canvas id="multeGiocatoreChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Top 5 Denunciatori -->
        <div class="col-lg-4">
            <div class="card bg-dark border-secondary shadow-sm h-100">
                <div class="card-header bg-transparent border-secondary">
                    <h5 class="text-artiglio mb-0"><i class="bi bi-people me-2"></i>Top 5 Denunciatori</h5>
                </div>
                <div class="card-body">
                    <canvas id="denunciatoriChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
    window.__statsMulteData = {
        mesiMulte: {{ mesi_multe | tojson | safe }},
        multeCountPerMese: {{ multe_count_per_mese | tojson | safe }},
        giocatoriNomi: {{ multe_per_giocatore | map(attribute=0) | list | tojson | safe }},
        giocatoriFallbackNomi: {{ multe_per_giocatore | map(attribute=1) | list | tojson | safe }},
        giocatoriImporti: {{ multe_per_giocatore | map(attribute=2) | list | tojson | safe }},
        denunciatoriNomi: {{ denunciatori | map(attribute=0) | list | tojson | safe }},
        denunciatoriFallbackNomi: {{ denunciatori | map(attribute=1) | list | tojson | safe }},
        denunciatoriConteggi: {{ denunciatori | map(attribute=2) | list | tojson | safe }}
    };

    if (typeof window.initStatsMulte === 'function') {
        window.initStatsMulte(window.__statsMulteData);
    }
</script>

{% endblock %}
